<html lang="en">
<html>

<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        form {
            background-color: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            width: 95%;
            padding: 10px;
            margin: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #218838;
        }

        li {
            list-style: none;
            background-color: white;
            width: 400px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 8px gray;
        }

        h2 {
            color: #007bff;
        }

        p {
            color: #555;
        }
    </style>
</head>

<body>

    <h1>TO - DO APP</h1>

    {{todo}}

    <form action="/add" method="post">

        <input type="text" name="todo" placeholder="Enter Task">

        <input type="text" name="des" placeholder="Enter Description">

        <input type="submit" value="Add Task">

    </form>


    {% for i in todo %}

    <li>

        <h2>{{i.get('todo')}}</h2>

        <p>{{i.get('des')}}</p>

    </li>

    {% endfor %}


</body>

</html>
